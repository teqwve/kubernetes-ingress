---
kind: Deployment
apiVersion: apps/v1
metadata:
  name: http-echo-8888
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: http-echo
      app.kubernetes.io/instance: http-echo-8888
  template:
    metadata:
      labels:
        app.kubernetes.io/name: http-echo
        app.kubernetes.io/instance: http-echo-8888
    spec:
      containers:
        - name: http-echo
          image: haproxytech/http-echo:latest
          imagePullPolicy: Never
          args:
          - --http=8888
          - --default-response=hostname
          ports:
            - name: http
              containerPort: 8888
              protocol: TCP
---
kind: Deployment
apiVersion: apps/v1
metadata:
  name: http-echo-9999
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: http-echo
      app.kubernetes.io/instance: http-echo-9999
  template:
    metadata:
      labels:
        app.kubernetes.io/name: http-echo
        app.kubernetes.io/instance: http-echo-9999
    spec:
      containers:
        - name: http-echo
          image: haproxytech/http-echo:latest
          imagePullPolicy: Never
          args:
          - --http=9999
          - --default-response=hostname
          ports:
            - name: http
              containerPort: 9999
              protocol: TCP
---
kind: Service
apiVersion: v1
metadata:
  name: http-echo
spec:
  ipFamilyPolicy: RequireDualStack
  ports:
    - name: http
      protocol: TCP
      port: 80
      targetPort: http
  selector:
    app.kubernetes.io/name: http-echo
